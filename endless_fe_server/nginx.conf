server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Custom MIME types for Rogue Engine assets
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/svg+xml                         svg;
        application/json                      json rogueScene roguePrefab rogueMaterial rogueAnimation;
        application/octet-stream              meta;
    }

    # Required for SharedArrayBuffer (Three.js audio, physics, etc.)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # No caching for static assets
    location ~* \.(png|jpg|jpeg|svg|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Rogue Engine data files
    location ~* \.(rogueScene|roguePrefab|rogueMaterial|rogueAnimation|meta)$ {
        add_header Content-Type "application/json";
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        # Increase send buffer for large asset files served to Cloudflare Tunnel
        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;
}
