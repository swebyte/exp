<!-- Life event -->
<ng-container *ngIf="isLifeEvent; else normal">
  <div class="life-event">
    <div class="life-event-year">{{ experience.start_date | date : 'yyyy' }}</div>
    <div class="life-event-body">
      <h4 class="life-event-title">{{ experience.title }}</h4>
      <p class="life-event-desc" *ngIf="experience.description">{{ experience.description }}</p>
      <div class="life-event-actions">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</ng-container>

<!-- Normal experience -->
<ng-template #normal>
  <div class="exp-card">
    <div class="exp-card-header">
      <div class="exp-card-meta">
        <h3 class="exp-role">{{ experience.title }}</h3>
        <p class="exp-company">
          <i class="bi bi-building"></i>
          {{ experience.company }}
        </p>
      </div>
      <div class="exp-card-right">
        <span class="exp-dates">
          <i class="bi bi-calendar3"></i>
          {{ experience.start_date | date : 'yyyy' }}
          {{ experience.end_date ? '– ' + (experience.end_date | date : 'yyyy') : '– Present' }}
        </span>
        <div class="exp-card-actions">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
    <div class="exp-card-body">
      <markdown [data]="experience.description"></markdown>
    </div>
  </div>
</ng-template>
